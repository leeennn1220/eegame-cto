<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast - eegame</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            touch-action: none; /* Prevent scroll on touch */
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
        }
        h1 { margin: 15px 0 5px 0; color: #00d2ff; font-size: 24px; text-shadow: 0 0 10px #00d2ff; }
        #score { font-size: 20px; font-weight: bold; color: #ff007f; margin-bottom: 15px; }
        #gameArea { position: relative; display: flex; justify-content: center; width: 100%; }
        canvas {
            display: block;
            background-color: #16213e;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #gameOver {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 12px; backdrop-filter: blur(5px);
        }
        #gameOver.visible { display: flex; }
        button {
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            color: #1a1a2e; background: #00d2ff; border: none; border-radius: 25px;
            cursor: pointer; box-shadow: 0 0 15px #00d2ff; margin-top: 15px;
        }
        button:active { transform: scale(0.95); }
        
        #floatingText {
            position: absolute; 
            color: #ffcc00; 
            font-size: 32px; 
            font-weight: bold; 
            text-shadow: 0 0 15px #ffcc00, 0 0 5px #fff; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 100; 
            left: 50%; 
            top: 40%; 
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <h1>🟩 方塊爆破 (Block Blast)</h1>
    <div id="score">分數: 0</div>
    <div id="gameArea">
        <canvas id="gameCanvas"></canvas>
        <div id="floatingText">🍋 +500</div>
        <div id="gameOver">
            <h2 style="color: #ff007f;">沒有空間了！</h2>
            <p>最終分數: <span id="finalScore">0</span></p>
            <button onclick="startGame()">再玩一局🎶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverEl = document.getElementById('gameOver');

        // ==== 音效系統 (Web Audio API) 強化版解鎖 ==== 
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!audioCtx.unlocked) {
                // 播放一段無聲音訊強制解鎖 iOS 的硬體限制
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);
                audioCtx.unlocked = true;
            }
        }

        // 監聽任何觸控或點擊來解鎖音效
        window.addEventListener('touchstart', initAudio, { once: true });
        window.addEventListener('mousedown', initAudio, { once: true });

        function playSound(type) {
            initAudio(); // 確保每次播放前都嘗試喚醒
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'drop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'clear') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(1000, now + 0.2);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'bonus') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.1);
                osc.frequency.setValueAtTime(1600, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.6);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'pickup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(400, now + 0.05);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            }
        }

        // ==== 滿版響應式版面計算 ====
        const screenMargin = 20;
        let maxCanvasWidth = Math.min(window.innerWidth - screenMargin, 400); 
        canvas.width = maxCanvasWidth;

        const GRID_SIZE = 8;
        const CELL_SIZE = Math.floor(canvas.width / GRID_SIZE);
        canvas.width = CELL_SIZE * GRID_SIZE; 

        const GRID_OFFSET_X = 0; 
        const GRID_OFFSET_Y = 15;
        const TRAY_Y = GRID_OFFSET_Y + (GRID_SIZE * CELL_SIZE) + 40;
        
        canvas.height = TRAY_Y + (CELL_SIZE * 3.5);

        let board = [];
        let itemsBoard = []; // 用來放置檸檬等特殊道具
        let score = 0;
        let trayShapes = [];
        let draggingShape = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        const SHAPES_DATA = [
            { color: '#ff3366', blocks: [[0,0]] }, 
            { color: '#33ccff', blocks: [[0,0],[1,0]] }, 
            { color: '#33ccff', blocks: [[0,0],[0,1]] }, 
            { color: '#66ff66', blocks: [[0,0],[1,0],[2,0]] }, 
            { color: '#66ff66', blocks: [[0,0],[0,1],[0,2]] }, 
            { color: '#ffcc00', blocks: [[0,0],[1,0],[0,1],[1,1]] }, 
            { color: '#cc66ff', blocks: [[0,0],[1,0],[2,0],[0,1],[0,2]] }, 
            { color: '#cc66ff', blocks: [[2,0],[2,1],[0,2],[1,2],[2,2]] }, 
            { color: '#ff9933', blocks: [[0,0],[1,0],[2,0],[1,1],[1,2]] }, 
            { color: '#ff9933', blocks: [[0,0],[0,1],[0,2],[1,2],[2,2]] },
            { color: '#33ffcc', blocks: [[0,0],[1,0],[2,0],[3,0]] }, 
            { color: '#33ffcc', blocks: [[0,0],[0,1],[0,2],[0,3]] }, 
            { color: '#ff44aa', blocks: [[0,0],[1,0],[1,1],[2,1]] }
        ];

        function initBoard() {
            board = [];
            itemsBoard = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                board[r] = new Array(GRID_SIZE).fill(null);
                itemsBoard[r] = new Array(GRID_SIZE).fill(null);
            }
        }

        function spawnLemon() {
            let emptyCells = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === null && itemsBoard[r][c] === null) {
                        emptyCells.push({r, c});
                    }
                }
            }
            if (emptyCells.length > 0) {
                // 機率性生成（確保畫面上一直有至少一顆檸檬）
                let currentLemons = 0;
                itemsBoard.forEach(row => row.forEach(i => { if(i==='lemon') currentLemons++ }));
                
                if (currentLemons < 2) {
                    let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    itemsBoard[randomCell.r][randomCell.c] = 'lemon';
                }
            }
        }

        function spawnTray() {
            trayShapes = [];
            const spacing = canvas.width / 3;
            for (let i = 0; i < 3; i++) {
                const sData = SHAPES_DATA[Math.floor(Math.random() * SHAPES_DATA.length)];
                trayShapes.push({
                    data: sData,
                    homeX: (spacing * i) + spacing / 2,
                    homeY: TRAY_Y + (CELL_SIZE * 1.5),
                    x: (spacing * i) + spacing / 2,
                    y: TRAY_Y + (CELL_SIZE * 1.5),
                    scale: 0.55,
                    placed: false
                });
            }
            spawnLemon(); // 每次補滿托盤時，機率性生成檸檬！
        }

        function startGame() {
            initAudio();
            initBoard();
            score = 0;
            updateScore(0);
            gameOverEl.classList.remove('visible');
            spawnTray();
            draw();
        }

        function updateScore(add) {
            score += add;
            scoreEl.innerText = '分數: ' + score;
        }

        function showFloatingText(text) {
            const el = document.getElementById('floatingText');
            el.innerText = text;
            el.style.transition = 'none';
            el.style.opacity = '1';
            el.style.top = '50%';
            
            // force DOM reflow
            void el.offsetWidth;

            el.style.transition = 'all 1.5s cubic-bezier(0.1, 0.8, 0.1, 1)';
            el.style.opacity = '0';
            el.style.top = '10%';
        }

        function drawRoundRect(x, y, w, h, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();
            // inner glow
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.roundRect(x+2, y+2, w-4, h/3, radius-2);
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Board Grid
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const bx = GRID_OFFSET_X + c * CELL_SIZE;
                    const by = GRID_OFFSET_Y + r * CELL_SIZE;
                    
                    // 1. 畫空格
                    if (!board[r][c]) {
                        drawRoundRect(bx, by, CELL_SIZE-2, CELL_SIZE-2, 4, '#0f172a');
                    }
                    
                    // 2. 如果底下有檸檬，畫出來
                    if (itemsBoard[r][c] === 'lemon') {
                        ctx.font = (CELL_SIZE * 0.6) + "px Arial";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText("🍋", bx + CELL_SIZE/2 - 1, by + CELL_SIZE/2 - 1);
                    }

                    // 3. 畫實體方塊
                    if (board[r][c]) {
                        drawRoundRect(bx, by, CELL_SIZE-2, CELL_SIZE-2, 6, board[r][c]);
                        
                        // 讓方塊覆蓋上去後，檸檬也能透出來給玩家看到 (視覺提示)
                        if (itemsBoard[r][c] === 'lemon') {
                            ctx.font = (CELL_SIZE * 0.45) + "px Arial";
                            ctx.fillStyle = 'rgba(255,255,255,0.8)';
                            ctx.fillText("🍋", bx + CELL_SIZE/2 - 1, by + CELL_SIZE/2 - 1);
                        }
                    }
                }
            }

            // Draw shapes in tray
            trayShapes.forEach((ts) => {
                if (ts.placed || ts === draggingShape) return;
                drawShape(ts.data, ts.x, ts.y, ts.scale);
            });

            // Draw dragging shape & shadow
            if (draggingShape) {
                let p = getPivotPosition(draggingShape);
                if (canPlace(draggingShape.data, p.col, p.row)) {
                    draggingShape.data.blocks.forEach(b => {
                        const bx = GRID_OFFSET_X + (p.col + b[0]) * CELL_SIZE;
                        const by = GRID_OFFSET_Y + (p.row + b[1]) * CELL_SIZE;
                        drawRoundRect(bx, by, CELL_SIZE-2, CELL_SIZE-2, 6, 'rgba(255,255,255,0.3)');
                    });
                }
                drawShape(draggingShape.data, draggingShape.x, draggingShape.y, draggingShape.scale);
            }
        }

        function drawShape(sData, cx, cy, scale) {
            const size = CELL_SIZE * scale;
            let minX = 99, minY = 99, maxX = -99, maxY = -99;
            sData.blocks.forEach(b => {
                minX = Math.min(minX, b[0]); maxX = Math.max(maxX, b[0]);
                minY = Math.min(minY, b[1]); maxY = Math.max(maxY, b[1]);
            });
            const ox = cx - ((minX + maxX + 1) * size) / 2;
            const oy = cy - ((minY + maxY + 1) * size) / 2;

            sData.blocks.forEach(b => {
                drawRoundRect(ox + b[0] * size, oy + b[1] * size, size - 2, size - 2, 4 * scale, sData.color);
            });
        }

        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handleStart(e) {
            initAudio(); 
            if (e.cancelable) e.preventDefault();
            if (gameOverEl.classList.contains('visible')) return;
            const pos = getEventPos(e);

            for (let i = trayShapes.length - 1; i >= 0; i--) {
                const ts = trayShapes[i];
                if (ts.placed) continue;
                if (Math.abs(pos.x - ts.x) < 50 && Math.abs(pos.y - ts.y) < 50) {
                    playSound('pickup'); 
                    draggingShape = ts;
                    ts.scale = 1.0; 
                    dragOffsetX = 0; 
                    dragOffsetY = -(CELL_SIZE * 3); 
                    ts.x = pos.x + dragOffsetX;
                    ts.y = pos.y + dragOffsetY;
                    draw();
                    break;
                }
            }
        }

        function handleMove(e) {
            if (!draggingShape) return;
            if (e.cancelable) e.preventDefault();
            const pos = getEventPos(e);
            draggingShape.x = pos.x + dragOffsetX;
            draggingShape.y = pos.y + dragOffsetY;
            draw();
        }

        function getPivotPosition(shape) {
            let minX = 99, minY = 99, maxX = -99, maxY = -99;
            shape.data.blocks.forEach(b => {
                minX = Math.min(minX, b[0]); maxX = Math.max(maxX, b[0]);
                minY = Math.min(minY, b[1]); maxY = Math.max(maxY, b[1]);
            });
            const ox = shape.x - ((minX + maxX + 1) * CELL_SIZE) / 2;
            const oy = shape.y - ((minY + maxY + 1) * CELL_SIZE) / 2;
            let col = Math.round((ox - GRID_OFFSET_X) / CELL_SIZE);
            let row = Math.round((oy - GRID_OFFSET_Y) / CELL_SIZE);
            return { col, row };
        }

        function handleEnd(e) {
            if (!draggingShape) return;
            if (e.cancelable) e.preventDefault();
            
            let p = getPivotPosition(draggingShape);

            if (canPlace(draggingShape.data, p.col, p.row)) {
                placeShape(draggingShape.data, p.col, p.row);
                playSound('drop'); 
                draggingShape.placed = true;
                draggingShape = null;
                updateScore(10); 
                
                let result = checkClears();
                if(result === 'bonus') {
                    setTimeout(() => playSound('bonus'), 100);
                } else if (result === 'clear') {
                    setTimeout(() => playSound('clear'), 150);
                }

                if (trayShapes.every(ts => ts.placed)) {
                    spawnTray();
                }
                
                setTimeout(() => {
                    if (checkGameOver()) {
                        playSound('gameover'); 
                        finalScoreEl.innerText = score;
                        gameOverEl.classList.add('visible');
                    } else {
                        draw(); 
                    }
                }, 50);
            } else {
                draggingShape.x = draggingShape.homeX;
                draggingShape.y = draggingShape.homeY;
                draggingShape.scale = 0.55;
                draggingShape = null;
            }
            draw();
        }

        function canPlace(sData, pCol, pRow) {
            for (let b of sData.blocks) {
                const c = pCol + b[0];
                const r = pRow + b[1];
                if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return false;
                if (board[r][c] !== null) return false;
            }
            return true;
        }

        function placeShape(sData, pCol, pRow) {
            for (let b of sData.blocks) {
                board[pRow + b[1]][pCol + b[0]] = sData.color;
            }
        }

        function checkClears() {
            let rowsToClear = [];
            let colsToClear = [];

            for (let r = 0; r < GRID_SIZE; r++) {
                if (board[r].every(cell => cell !== null)) rowsToClear.push(r);
            }
            for (let c = 0; c < GRID_SIZE; c++) {
                let colFull = true;
                for (let r = 0; r < GRID_SIZE; r++) {
                    if (board[r][c] === null) { colFull = false; break; }
                }
                if (colFull) colsToClear.push(c);
            }

            let clearedCells = new Set();
            rowsToClear.forEach(r => {
                for (let c = 0; c < GRID_SIZE; c++) clearedCells.add(`${r},${c}`);
            });
            colsToClear.forEach(c => {
                for (let r = 0; r < GRID_SIZE; r++) clearedCells.add(`${r},${c}`);
            });

            if (clearedCells.size > 0) {
                let bonusPoints = 0;
                let gotLemon = false;

                clearedCells.forEach(key => {
                    let [r, c] = key.split(',').map(Number);
                    board[r][c] = null;
                    if (itemsBoard[r][c] === 'lemon') {
                        bonusPoints += 500;
                        itemsBoard[r][c] = null; // Consume the lemon
                        gotLemon = true;
                    }
                });

                const linesCleared = rowsToClear.length + colsToClear.length;
                updateScore(linesCleared * 100 + bonusPoints); 
                
                if (gotLemon) {
                    showFloatingText("🍋 +500");
                    return 'bonus';
                }
                return 'clear';
            }
            return null;
        }

        function checkGameOver() {
            const unplaced = trayShapes.filter(ts => !ts.placed);
            if (unplaced.length === 0) return false;

            for (let ts of unplaced) {
                let canFitAnywhere = false;
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (canPlace(ts.data, c, r)) {
                            canFitAnywhere = true;
                            break;
                        }
                    }
                    if (canFitAnywhere) break;
                }
                if (canFitAnywhere) return false; 
            }
            return true; 
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});

        startGame();
    </script>
</body>
</html>
